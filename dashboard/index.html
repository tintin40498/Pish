<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Cuenta - Pish</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial; background: #0a0e27; color: white; }
        .header { background: #1a1e3a; padding: 20px; border-bottom: 2px solid #00ffcc; }
        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 24px; margin-bottom: 40px; }
        .card { background: #1a1e3a; border-radius: 16px; padding: 24px; border: 1px solid #333; }
        .card h3 { color: #00ffcc; margin-bottom: 16px; }
        .card .value { font-size: 32px; font-weight: bold; margin-bottom: 8px; }
        .badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; }
        .badge-pro { background: #00ffcc; color: #0a0e27; }
        .badge-free { background: #333; color: white; }
        .badge-active { background: #00c853; color: white; }
        .badge-inactive { background: #d32f2f; color: white; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #333; }
        .logout-btn { background: #d32f2f; color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; float: right; }
        .logout-btn:hover { background: #b71c1c; }
        .loading { text-align: center; padding: 40px; }
        .code { background: #0a0e27; padding: 12px; border-radius: 8px; font-family: monospace; font-size: 12px; word-break: break-all; }
    </style>
</head>
<body>
    <div class="header">
        <div class="container" style="padding: 0;">
            <h1>🛡️ Pish</h1>
            <button class="logout-btn" onclick="logout()">Cerrar sesión</button>
        </div>
    </div>
    <div class="container">
        <div id="content" class="loading">Cargando datos de tu cuenta...</div>
    </div>
    <script>
        const API_URL = 'http://localhost:5000';
        let token = localStorage.getItem('token');

        async function loadDashboard() {
            if (!token) {
                window.location.href = 'login.html';
                return;
            }

            try {
                const res = await fetch(`${API_URL}/api/v1/perfil`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (res.status === 401) {
                    localStorage.removeItem('token');
                    window.location.href = 'login.html';
                    return;
                }

                const user = await res.json();
                renderDashboard(user);
            } catch (error) {
                document.getElementById('content').innerHTML = '<div class="loading">Error conectando al servidor</div>';
            }
        }

        function renderDashboard(user) {
            const planClass = user.suscripcion?.plan === 'pro' ? 'badge-pro' : 'badge-free';
            const planName = user.suscripcion?.plan === 'pro' ? 'Pro' : 'Free';
            const statusClass = user.suscripcion?.estado === 'active' ? 'badge-active' : 'badge-inactive';
            const statusText = user.suscripcion?.estado === 'active' ? 'Activa' : 'Inactiva';

            const html = `
                <div class="cards">
                    <div class="card">
                        <h3>Plan actual</h3>
                        <div class="value"><span class="badge ${planClass}">${planName}</span></div>
                        <p>Estado: <span class="badge ${statusClass}">${statusText}</span></p>
                    </div>
                    <div class="card">
                        <h3>Licencia</h3>
                        <div class="code">${user.licencia?.key || 'Sin licencia activa'}</div>
                        <p style="margin-top: 12px;">Última verificación: ${user.licencia?.ultima_verificacion || 'Nunca'}</p>
                    </div>
                    <div class="card">
                        <h3>Válida hasta</h3>
                        <div class="value">${user.suscripcion?.valida_hasta ? new Date(user.suscripcion.valida_hasta).toLocaleDateString() : 'N/A'}</div>
                        <p>Miembro desde: ${new Date(user.miembro_desde).toLocaleDateString()}</p>
                    </div>
                </div>
                <div class="card">
                    <h3>📜 Cómo activar Pish en tu servidor</h3>
                    <ol style="margin: 16px 0 16px 20px; line-height: 1.8;">
                        <li>Descargá Pish: <code>git clone https://github.com/tintin40498/pish.git</code></li>
                        <li>Configurá tu licencia: <code>python3 core/verify_license.py config</code></li>
                        <li>Ingresá tu email: <strong>${user.email}</strong></li>
                        <li>Ingresá tu clave de licencia: <strong>${user.licencia?.key || 'Sin licencia'}</strong></li>
                        <li>Iniciá Pish: <code>./start.sh</code></li>
                    </ol>
                </div>
            `;
            document.getElementById('content').innerHTML = html;
        }

        function logout() {
            localStorage.removeItem('token');
            window.location.href = 'login.html';
        }

        loadDashboard();
    </script>
</body>
</html>
